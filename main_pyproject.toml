[project]
name = "ml-agentic-system"
version = "0.1.0"
description = "Multi-agent ML system with model selection, training, and evaluation agents"
authors = [
    {name = "ML Mentor System", email = "contact@coralprotocol.com"}
]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
keywords = [
    "machine-learning",
    "multi-agent",
    "coral-protocol",
    "langchain",
    "mistral",
    "elevenlabs",
    "tts"
]

dependencies = [
    # Core LangChain dependencies
    "langchain==0.3.25",
    "langchain-community==0.3.24",
    "langchain-experimental==0.3.4",
    "langchain-groq==0.3.4",
    "langchain-mcp-adapters==0.1.7",
    "langchain-openai==0.3.26",
    "langchain-mistralai==0.3.14",
    "langchain-huggingface>=0.3.1",
    
    # HTTP clients and async support
    "httpx>=0.24.0",
    "aiohttp>=3.8.0",
    
    # Configuration and environment
    "python-dotenv>=1.0.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    
    # Data processing and utilities
    "pandas==2.3.0",
    "numpy>=1.24.0",
    "tabulate>=0.9.0",
    
    # Audio processing (for TTS)
    "playsound>=1.3.0",
    "pygame>=2.0.0",  # Alternative audio player
    
    # Package management
    "uv>=0.7.17",
    
    # Development and debugging
    "rich>=13.0.0",  # Better console output
    "click>=8.0.0",  # CLI interface
    "typer>=0.9.0",  # Modern CLI
]

[project.optional-dependencies]
# Development dependencies
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
    "pre-commit>=3.0.0",
]

# Testing dependencies
test = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.10.0",
    "httpx-mock>=0.10.0",
    "responses>=0.23.0",
]

# Documentation dependencies
docs = [
    "mkdocs>=1.4.0",
    "mkdocs-material>=9.0.0",
    "mkdocstrings[python]>=0.20.0",
]

# Production deployment
production = [
    "gunicorn>=20.1.0",
    "uvicorn[standard]>=0.20.0",
]

# All optional dependencies
all = [
    "ml-agentic-system[dev,test,docs,production]"
]

[project.urls]
Homepage = "https://github.com/Coral-Protocol/ML-Agentic-System"
Documentation = "https://github.com/Coral-Protocol/ML-Agentic-System/blob/main/README.md"
Repository = "https://github.com/Coral-Protocol/ML-Agentic-System.git"
Issues = "https://github.com/Coral-Protocol/ML-Agentic-System/issues"
Changelog = "https://github.com/Coral-Protocol/ML-Agentic-System/blob/main/CHANGELOG.md"
"Coral Protocol" = "https://coralprotocol.com"
Discord = "https://discord.com/invite/Xjm892dtt3"

[project.scripts]
# CLI entry points for different modes
ml-orchestrator = "main:orchestrator_cli_interactive"
ml-model-selection = "main:agent_cli_model_selection"
ml-training = "main:agent_cli_training"
ml-evaluation = "main:agent_cli_evaluation"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["agents*", "*.py"]
exclude = ["tests*", "docs*", "*.egg-info*"]

[tool.black]
line-length = 88
target-version = ['py310', 'py311', 'py312', 'py313']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88
skip_gitignore = true

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "playsound.*",
    "pygame.*",
    "elevenlabs.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = [
    "tests",
]
filterwarnings = [
    "error",
    "ignore::UserWarning",
    "ignore::DeprecationWarning",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
    "unit: marks tests as unit tests",
]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["."]
omit = [
    "*/tests/*",
    "*/test_*",
    "setup.py",
    "*/venv/*",
    "*/.venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]

[tool.ruff]
target-version = "py310"
line-length = 88
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501",  # line too long, handled by black
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
]

[tool.ruff.per-file-ignores]
"__init__.py" = ["F401"]

[tool.bandit]
exclude_dirs = ["tests", "build", "dist"]
skips = ["B101", "B601"]

# Environment configuration
[tool.dotenv]
files = [".env", ".env.local", ".env.production"]

# UV configuration for package management
[tool.uv]
dev-dependencies = [
    "pytest>=7.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
]

[tool.uv.sources]
# Add any custom package sources here if needed